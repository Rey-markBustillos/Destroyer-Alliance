services:
  - type: web
    name: destroyer-alliance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
  - type: web
    name: destroyer-alliance-frontend
    runtime: static
    rootDir: Destroyer Allince
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://destroyer-alliance-1.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
